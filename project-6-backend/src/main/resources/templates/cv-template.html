<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8"/>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            font-size: 10px;
            color: #1a1a2e;
            background: #fff;
        }

        /* ===== LAYOUT ===== */
        .wrapper { display: flex; min-height: 100vh; }

        /* --- Left sidebar --- */
        .sidebar {
            width: 34%;
            background: #1a1a2e;
            color: #e0e0e0;
            padding: 28px 18px;
        }
        .avatar-wrap {
            text-align: center;
            margin-bottom: 20px;
        }
        .avatar {
            width: 90px; height: 90px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #4fc3f7;
        }
        .avatar-placeholder {
            width: 90px; height: 90px;
            border-radius: 50%;
            background: #2d2d4e;
            border: 3px solid #4fc3f7;
            display: inline-block;
            line-height: 90px;
            text-align: center;
            font-size: 28px;
            color: #4fc3f7;
        }
        .name-sidebar {
            font-size: 16px;
            font-weight: bold;
            color: #ffffff;
            text-align: center;
            margin-bottom: 4px;
        }
        .position-sidebar {
            font-size: 10px;
            color: #90caf9;
            text-align: center;
            margin-bottom: 18px;
        }

        /* sidebar sections */
        .sidebar-section { margin-bottom: 16px; }
        .sidebar-section-title {
            font-size: 10px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #4fc3f7;
            border-bottom: 1px solid #2d2d4e;
            padding-bottom: 4px;
            margin-bottom: 8px;
        }
        .contact-item {
            font-size: 9px;
            color: #b0bec5;
            margin-bottom: 4px;
            word-break: break-all;
        }
        .contact-item span { color: #e0e0e0; }

        /* skill bars */
        .skill-group-name {
            font-size: 9px;
            font-weight: bold;
            color: #90caf9;
            margin-bottom: 4px;
            margin-top: 6px;
        }
        .skill-row {
            margin-bottom: 5px;
        }
        .skill-name {
            font-size: 8.5px;
            color: #cfd8dc;
            margin-bottom: 2px;
        }
        .skill-bar-bg {
            background: #2d2d4e;
            border-radius: 3px;
            height: 5px;
            width: 100%;
        }
        .skill-bar-fill {
            background: #4fc3f7;
            border-radius: 3px;
            height: 5px;
        }

        /* languages */
        .lang-row {
            display: flex;
            justify-content: space-between;
            font-size: 9px;
            color: #b0bec5;
            margin-bottom: 4px;
        }
        .lang-level { color: #90caf9; }

        /* --- Right main content --- */
        .main {
            width: 66%;
            padding: 28px 22px;
            background: #fff;
        }

        /* Header */
        .main-header {
            border-bottom: 2px solid #1a1a2e;
            padding-bottom: 10px;
            margin-bottom: 18px;
        }
        .main-name {
            font-size: 22px;
            font-weight: bold;
            color: #1a1a2e;
        }
        .main-position {
            font-size: 12px;
            color: #4fc3f7;
            font-weight: 600;
            margin-top: 2px;
        }

        /* Sections */
        .section { margin-bottom: 16px; }
        .section-title {
            font-size: 11px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: #1a1a2e;
            border-left: 3px solid #4fc3f7;
            padding-left: 8px;
            margin-bottom: 10px;
        }

        /* Intro */
        .intro-text {
            font-size: 9.5px;
            color: #555;
            line-height: 1.6;
        }

        /* Timeline items */
        .item { margin-bottom: 10px; }
        .item-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }
        .item-title {
            font-size: 10px;
            font-weight: bold;
            color: #1a1a2e;
        }
        .item-subtitle {
            font-size: 9px;
            color: #4fc3f7;
        }
        .item-date {
            font-size: 8.5px;
            color: #888;
            white-space: nowrap;
        }
        .item-desc {
            font-size: 9px;
            color: #555;
            line-height: 1.55;
            margin-top: 3px;
        }

        /* Tags (for skills in main) */
        .tags { display: flex; flex-wrap: wrap; gap: 4px; }
        .tag {
            background: #e3f2fd;
            color: #1565c0;
            border-radius: 3px;
            padding: 2px 7px;
            font-size: 8.5px;
            font-weight: 500;
        }

        /* cert/award items */
        .cert-item { margin-bottom: 6px; }
        .cert-name { font-size: 9.5px; font-weight: bold; color: #1a1a2e; }
        .cert-org { font-size: 8.5px; color: #555; }
        .cert-date { font-size: 8px; color: #888; }
    </style>
</head>
<body>
<div class="wrapper">

    <!-- ===== SIDEBAR ===== -->
    <div class="sidebar">
        <!-- Avatar + Name -->
        <div class="avatar-wrap">
            <th:block th:if="${avatar != null and avatar != ''}">
                <img class="avatar" th:src="${avatar}" alt="avatar"/>
            </th:block>
            <th:block th:unless="${avatar != null and avatar != ''}">
                <div class="avatar-placeholder" th:text="${#strings.substring(fullName,0,1)}">A</div>
            </th:block>
        </div>
        <div class="name-sidebar" th:text="${fullName}">Họ và Tên</div>
        <div class="position-sidebar" th:text="${position}">Vị trí ứng tuyển</div>

        <!-- Contact -->
        <div class="sidebar-section">
            <div class="sidebar-section-title">Liên hệ</div>
            <div class="contact-item" th:if="${email != null}">📧 <span th:text="${email}"></span></div>
            <div class="contact-item" th:if="${phone != null}">📞 <span th:text="${phone}"></span></div>
            <div class="contact-item" th:if="${city != null}">📍 <span th:text="${city}"></span></div>
            <div class="contact-item" th:if="${personalLink != null and personalLink != ''}">🔗 <span th:text="${personalLink}"></span></div>
        </div>

        <!-- Skills (in sidebar) -->
        <div class="sidebar-section" th:if="${skills != null and !skills.isEmpty()}">
            <div class="sidebar-section-title">Kỹ năng</div>
            <th:block th:each="group : ${skills}">
                <div class="skill-group-name" th:if="${group.groupName != null}" th:text="${group.groupName}"></div>
                <div th:each="item : ${group.items}" class="skill-row">
                    <div class="skill-name" th:text="${item.skill}"></div>
                    <div class="skill-bar-bg">
                        <div class="skill-bar-fill" th:style="'width:' + (${item.experience} == 'Xuất sắc' ? '95%' : (${item.experience} == 'Thành thạo' ? '80%' : (${item.experience} == 'Trung bình' ? '60%' : '40%')))"></div>
                    </div>
                </div>
            </th:block>
        </div>

        <!-- Languages -->
        <div class="sidebar-section" th:if="${languages != null and !languages.isEmpty()}">
            <div class="sidebar-section-title">Ngôn ngữ</div>
            <div th:each="lang : ${languages}" class="lang-row">
                <span th:text="${lang.language}"></span>
                <span class="lang-level" th:text="${lang.level}"></span>
            </div>
        </div>
    </div>

    <!-- ===== MAIN CONTENT ===== -->
    <div class="main">

        <!-- Header -->
        <div class="main-header">
            <div class="main-name" th:text="${fullName}">Họ và Tên</div>
            <div class="main-position" th:text="${position}">Vị trí ứng tuyển</div>
        </div>

        <!-- Giới thiệu -->
        <div class="section" th:if="${intro != null and intro != ''}">
            <div class="section-title">Giới thiệu bản thân</div>
            <p class="intro-text" th:text="${intro}"></p>
        </div>

        <!-- Kinh nghiệm -->
        <div class="section" th:if="${experiences != null and !experiences.isEmpty()}">
            <div class="section-title">Kinh nghiệm làm việc</div>
            <div th:each="exp : ${experiences}" class="item">
                <div class="item-header">
                    <div>
                        <div class="item-title" th:text="${exp.position}"></div>
                        <div class="item-subtitle" th:text="${exp.company}"></div>
                    </div>
                    <div class="item-date">
                        <span th:text="${exp.fromMonth + '/' + exp.fromYear}"></span>
                        <span th:if="${exp.isCurrentlyWorking}"> – Hiện tại</span>
                        <span th:unless="${exp.isCurrentlyWorking}" th:if="${exp.toMonth != null}" th:text="' – ' + ${exp.toMonth + '/' + exp.toYear}"></span>
                    </div>
                </div>
                <div class="item-desc" th:if="${exp.description != null}" th:text="${exp.description}"></div>
            </div>
        </div>

        <!-- Học vấn -->
        <div class="section" th:if="${educations != null and !educations.isEmpty()}">
            <div class="section-title">Học vấn</div>
            <div th:each="edu : ${educations}" class="item">
                <div class="item-header">
                    <div>
                        <div class="item-title" th:text="${edu.school}"></div>
                        <div class="item-subtitle" th:text="${(edu.degree != null ? edu.degree : '') + (edu.major != null ? ' – ' + edu.major : '')}"></div>
                    </div>
                    <div class="item-date">
                        <span th:text="${edu.fromYear}"></span>
                        <span th:if="${edu.isCurrentlyStudying}"> – Hiện tại</span>
                        <span th:unless="${edu.isCurrentlyStudying}" th:if="${edu.toYear != null}" th:text="' – ' + ${edu.toYear}"></span>
                    </div>
                </div>
                <div class="item-desc" th:if="${edu.details != null}" th:text="${edu.details}"></div>
            </div>
        </div>

        <!-- Dự án -->
        <div class="section" th:if="${projects != null and !projects.isEmpty()}">
            <div class="section-title">Dự án cá nhân</div>
            <div th:each="proj : ${projects}" class="item">
                <div class="item-header">
                    <div>
                        <div class="item-title" th:text="${proj.name}"></div>
                        <div class="item-subtitle" th:if="${proj.link != null}" th:text="${proj.link}"></div>
                    </div>
                    <div class="item-date">
                        <span th:text="${proj.fromMonth + '/' + proj.fromYear}"></span>
                        <span th:if="${proj.isCurrentlyWorking}"> – Hiện tại</span>
                        <span th:unless="${proj.isCurrentlyWorking}" th:if="${proj.toMonth != null}" th:text="' – ' + ${proj.toMonth + '/' + proj.toYear}"></span>
                    </div>
                </div>
                <div class="item-desc" th:if="${proj.description != null}" th:text="${proj.description}"></div>
            </div>
        </div>

        <!-- Chứng chỉ -->
        <div class="section" th:if="${certificates != null and !certificates.isEmpty()}">
            <div class="section-title">Chứng chỉ</div>
            <div th:each="cert : ${certificates}" class="cert-item">
                <div class="cert-name" th:text="${cert.name}"></div>
                <div class="cert-org" th:if="${cert.organization != null}" th:text="${cert.organization}"></div>
                <div class="cert-date" th:if="${cert.year != null}" th:text="${(cert.month != null ? cert.month + '/' : '') + cert.year}"></div>
            </div>
        </div>

        <!-- Giải thưởng -->
        <div class="section" th:if="${awards != null and !awards.isEmpty()}">
            <div class="section-title">Giải thưởng</div>
            <div th:each="award : ${awards}" class="cert-item">
                <div class="cert-name" th:text="${award.name}"></div>
                <div class="cert-org" th:if="${award.organization != null}" th:text="${award.organization}"></div>
                <div class="cert-date" th:if="${award.year != null}" th:text="${(award.month != null ? award.month + '/' : '') + award.year}"></div>
            </div>
        </div>

    </div>
</div>
</body>
</html>
